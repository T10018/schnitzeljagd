<!DOCTYPE html>
<!-- Definiert den Dokumenttyp als HTML5 -->
<html lang="de">
<!-- lang="de" kennzeichnet die Seite als deutschsprachig -->

<head>
  <meta charset="UTF-8">
  <!-- Zeichenkodierung UTF-8: unterstützt Umlaute und Sonderzeichen -->
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Optimiert die Darstellung auf Mobilgeräten -->
  
  <title>Willkommen</title>
  <!-- Titel der Seite, erscheint im Browser-Tab -->
  
  <link rel="stylesheet" href="../../style/speech.css">
  <!-- Bindet die externe CSS-Datei ein (zwei Verzeichnisse höher) -->
</head>

<body>

  <!-- Charakter-Bild links unten (Position wird über CSS gesteuert) -->
  <img id="character" src="../../images/character1.png" alt="Charakter">

  <!-- Sprechblase: zeigt den aktuellen Dialogtext an (wird per JavaScript aktualisiert) -->
  <div id="speech">Seiet gegrüßt, Feldmarschall Fabian. </div>

  <!-- Zurück-Button: startet versteckt, wird per JavaScript ab der zweiten Zeile eingeblendet -->
  <button class="button bottom-left" onclick="previous()" id="backBtn" style="display: none;">Zurück</button>
  
  <!-- Weiter-Button: startet sichtbar und wechselt am Ende zur nächsten Seite -->
  <button class="button bottom-right" onclick="next()" id="nextBtn">Weiter</button>

  <script>
    // Array mit allen Dialogzeilen in der richtigen Reihenfolge
    // Hinweis: Erste Zeile enthält Platzhalter für den Spielernamen (noch nicht dynamisch befüllt)
    const lines = [
        /*Variable mit Name des Spielers*/
      "Seiet gegrüßt, Feldmarschall Fabian. ",
      "Die Lage ist ernst. Französische Vorhuten wurden bereits jenseits von Wels gesichtet, sie marschieren rasch und ohne Rast. Es bleibt uns wenig Zeit. ", 
      "Ihr werdet mit dem Kommando über die Verteidigung von Ebelsberg betraut. Die Brücke über die Traun ist unser letzter Übergang, fällt sie, so verlieren wir den Anschluss an die Landeshauptstadt. ",
      "Ihr müsst nun klug und rasch handeln. Ich werde Euch mit Rat zur Seite stehen, soweit es mir möglich ist, auch wenn ich selbst diesen Kampf nicht mehr mit dem Säbel fechten kann. <br>Doch ich kenne diese Straßen, diese Männer und unsere Chancen. ",
      "Verzaget nicht, Feldmarschall. Österreich zählt auf Euch. "
    ];

    // Aktueller Index: gibt an, welche Zeile gerade angezeigt wird (0 = erste Zeile)
    let index = 0;

    // Aktualisiert die Sprechblase und die Button-Sichtbarkeit passend zum aktuellen Index
    function updateSpeech() {
      const speechElement = document.getElementById("speech");
      const backBtn = document.getElementById("backBtn");
      const nextBtn = document.getElementById("nextBtn");
      
      // Sprechblase ausblenden für weichen Übergang
      speechElement.style.opacity = '0';
      
      // Nach 200ms neuen Text einsetzen und Sprechblase wieder einblenden
      setTimeout(() => {
        speechElement.innerHTML = lines[index]; // Aktuellen Dialogtext setzen
        speechElement.style.opacity = '1';      // Sprechblase wieder einblenden
      }, 200);
      
      // Zurück-Button nur anzeigen, wenn nicht auf der ersten Zeile
      backBtn.style.display = index > 0 ? "block" : "none";
      
      // Weiter-Button-Beschriftung zurücksetzen
      nextBtn.innerHTML = "Weiter";
    }

    // Wird beim Klick auf "Weiter" aufgerufen
    function next() {
      if (index < lines.length - 1) {
        // Noch nicht am Ende: nächste Dialogzeile anzeigen
        index++;
        updateSpeech();
      } else {
        // Letzte Zeile erreicht: Seite mit Fade-out-Effekt verlassen
        document.body.classList.add('fade-out'); // Startet die Ausblend-Animation (definiert in CSS)
        
        requestAnimationFrame(() => {
          // Stellt sicher, dass der Browser die Animation rendert, bevor weitergeleitet wird
          setTimeout(() => {
            // Nach 500ms (= Dauer des Fade-outs) zur nächsten Seite weiterleiten
            window.location.href = "speech_task1_start.html";
          }, 500);
        });
      }
    }

    // Wird beim Klick auf "Zurück" aufgerufen
    function previous() {
      if (index > 0) {
        // Noch nicht am Anfang: vorherige Dialogzeile anzeigen
        index--;
        updateSpeech();
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<!-- Definiert den Dokumenttyp als HTML5 -->
<html lang="de">
<!-- lang="de" kennzeichnet die Seite als deutschsprachig -->

<head>
  <meta charset="UTF-8">
  <!-- Zeichenkodierung UTF-8: unterstützt Umlaute und Sonderzeichen -->
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Optimiert die Darstellung auf Mobilgeräten -->
  
  <title>Aufgabe 2</title>
  <!-- Titel der Seite, erscheint im Browser-Tab -->
  
  <link rel="stylesheet" href="../../style/speech.css">
  <!-- Bindet die externe CSS-Datei ein (zwei Verzeichnisse höher) -->
</head>

<body>

  <!-- Charakter-Bild links unten – überbringt die Aufgabenstellung für das Rucksack-Problem -->
  <img id="character" src="../../images/character1.png" alt="Charakter">

  <!-- Sprechblase: zeigt den aktuellen Dialogtext an (wird per JavaScript aktualisiert) -->
  <div id="speech">Feldmarschall, wir haben ein ernstes Problem. Der Nachschubwagen ist blockiert – die Achse ist beschädigt, und das Maultier schafft kaum noch mehr als 100 Kilogramm.</div>

  <!-- Zurück-Button: startet versteckt, wird ab der zweiten Zeile per JavaScript eingeblendet -->
  <button class="button bottom-left" onclick="previous()" id="backBtn" style="display: none;">Zurück</button>
  
  <!-- Weiter-Button: startet sichtbar und leitet am Ende zur eigentlichen Aufgaben-Seite weiter -->
  <button class="button bottom-right" onclick="next()" id="nextBtn">Weiter</button>

  <script>
    // Array mit allen Dialogzeilen dieser Szene in der richtigen Reihenfolge
    // Inhalt: Einführung in das Rucksack-Problem (max. 100 kg Zuladung, taktische Auswahl der Gegenstände)
    const lines = [
      "Feldmarschall, wir haben ein ernstes Problem. Der Nachschubwagen ist blockiert – die Achse ist beschädigt, und das Maultier schafft kaum noch mehr als 100 Kilogramm. ",
      "Die Lage an der Front ist dramatisch. Seit Tagen fehlen die Vorräte und es mangelt an allem - außer Entschlossenheit. Ihr müsst nun entscheiden, was mitgenommen wird. ", 
      "Was fehlt, kann töten. Was ihr mitnehmt, könnte Leben retten – oder verlieren. Denkt taktisch. Nicht alles, was schwer wiegt, ist auch von Gewicht. ",
      // Vierte Zeile: Liste aller verfügbaren Gegenstände mit ihrem jeweiligen Gewicht
      // <ul> und <li> erzeugen eine HTML-Aufzählungsliste direkt in der Sprechblase
      "Zur Verfügung stehen: <ul><li>Pulverfass (40 kg)</li><li>Brot für 3 Tage (30 kg)</li><li>Silberbesteck (10 kg)</li><li>Bandagen (20 kg)</li><li>Gewehrkiste (50 kg)</li><li>Kanonenkugel (30 kg)</li><li>Frische Uniformen (25 kg)</li></ul> ",
      // Fünfte Zeile: Hinweis auf die Gewichtsbeschränkung und Aufforderung zur Entscheidung
      "Die maximale Zuladung beträgt 100 kg. Trefft Eure Wahl und beeilt Euch. Die Schlacht wartet nicht. "
    ];

    // Aktueller Index: gibt an, welche Zeile gerade angezeigt wird (0 = erste Zeile)
    let index = 0;

    // Aktualisiert die Sprechblase und die Button-Sichtbarkeit passend zum aktuellen Index
    function updateSpeech() {
      const speechElement = document.getElementById("speech");
      const backBtn = document.getElementById("backBtn");
      const nextBtn = document.getElementById("nextBtn");
      
      // Sprechblase ausblenden für weichen Übergang
      speechElement.style.opacity = '0';
      
      // Nach 200ms neuen Text einsetzen und Sprechblase wieder einblenden
      setTimeout(() => {
        speechElement.innerHTML = lines[index]; // Aktuellen Dialogtext setzen
        speechElement.style.opacity = '1';      // Sprechblase wieder einblenden
      }, 200);
      
      // Zurück-Button nur anzeigen, wenn nicht auf der ersten Zeile
      backBtn.style.display = index > 0 ? "block" : "none";
      
      // Weiter-Button-Beschriftung zurücksetzen
      nextBtn.innerHTML = "Weiter";
    }

    // Wird beim Klick auf "Weiter" aufgerufen
    function next() {
      if (index < lines.length - 1) {
        // Noch nicht am Ende: nächste Dialogzeile anzeigen
        index++;
        updateSpeech();
      } else {
        // Letzte Zeile erreicht: Seite mit Fade-out-Effekt verlassen
        document.body.classList.add('fade-out'); // Startet die Ausblend-Animation (definiert in CSS)
        
        requestAnimationFrame(() => {
          // Stellt sicher, dass der Browser die Animation rendert, bevor weitergeleitet wird
          setTimeout(() => {
            // Nach 500ms (= Dauer des Fade-outs) zur Aufgaben-Seite (task2.html) weiterleiten
            window.location.href = "../schnitzeljagd_aufgaben/task2/task2.html";
          }, 500);
        });
      }
    }

    // Wird beim Klick auf "Zurück" aufgerufen
    function previous() {
      if (index > 0) {
        // Noch nicht am Anfang: vorherige Dialogzeile anzeigen
        index--;
        updateSpeech();
      }
    }
  </script>
</body>
</html>

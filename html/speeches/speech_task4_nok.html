<!DOCTYPE html>
<!-- Definiert den Dokumenttyp als HTML5 -->
<html lang="de">
<!-- lang="de" kennzeichnet die Seite als deutschsprachig -->

<head>
  <meta charset="UTF-8">
  <!-- Zeichenkodierung UTF-8: unterstützt Umlaute und Sonderzeichen -->
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Optimiert die Darstellung auf Mobilgeräten -->
  
  <title>Aufgabe 4</title>
  <!-- Titel der Seite, erscheint im Browser-Tab -->
  
  <link rel="stylesheet" href="../../style/speech.css">
  <!-- Bindet die externe CSS-Datei ein (zwei Verzeichnisse höher) -->
</head>

<body>

  <!-- Charakter-Bild links unten – kommentiert die Entscheidung, das Pulver zu belassen -->
  <img id="character" src="../../images/character1.png" alt="Charakter">

  <!-- Sprechblase: zeigt den aktuellen Dialogtext an (wird per JavaScript aktualisiert) -->
  <div id="speech">Sehr wohl, Feldmarschall. Ihr habt entschieden, das Pulver in der Kammer zu belassen – in der Hoffnung, dass unsere Truppen es bergen werden. Ein kühner Entschluss… doch das Risiko bleibt.</div>

  <!-- Zurück-Button: startet versteckt, wird ab der zweiten Zeile per JavaScript eingeblendet -->
  <button class="button bottom-left" onclick="previous()" id="backBtn" style="display: none;">Zurück</button>
  
  <!-- Weiter-Button: startet sichtbar und leitet am Ende zur Karten-Seite von Aufgabe 4 weiter -->
  <button class="button bottom-right" onclick="next()" id="nextBtn">Weiter</button>

  <script>
    // Array mit allen Dialogzeilen dieser Szene in der richtigen Reihenfolge
    // Inhalt: neutrale Reaktion auf die riskante Entscheidung (Pulver belassen)
    //         + Spannungsaufbau + Überleitung zum Kirchenplatz (nächste Station)
    const lines = [
      "Sehr wohl, Feldmarschall. Ihr habt entschieden, das Pulver in der Kammer zu belassen – in der Hoffnung, dass unsere Truppen es bergen werden. Ein kühner Entschluss… doch das Risiko bleibt. ",
      // Zweite Zeile: Unsicherheit über den Ausgang der Entscheidung – Spannungsaufbau
      "Der Feind rückt schnell vor, und es bleibt ungewiss, wer die Stellung länger halten kann. Gott gebe, dass Euer Vertrauen gerechtfertigt ist. Möge das Pulver unseren Männern dienen – und nicht gegen sie verwendet werden. ",
      // Dritte Zeile: Wegweisung zur nächsten Station (Kirchenplatz = nächste Aufgabe)
      "Begebt Euch nun zum Kirchenplatz, dort wartet bereits das nächste Problem... "
    ];

    // Aktueller Index: gibt an, welche Zeile gerade angezeigt wird (0 = erste Zeile)
    let index = 0;

    // Aktualisiert die Sprechblase und die Button-Sichtbarkeit passend zum aktuellen Index
    function updateSpeech() {
      const speechElement = document.getElementById("speech");
      const backBtn = document.getElementById("backBtn");
      const nextBtn = document.getElementById("nextBtn");
      
      // Sprechblase ausblenden für weichen Übergang
      speechElement.style.opacity = '0';
      
      // Nach 200ms neuen Text einsetzen und Sprechblase wieder einblenden
      setTimeout(() => {
        speechElement.innerHTML = lines[index]; // Aktuellen Dialogtext setzen
        speechElement.style.opacity = '1';      // Sprechblase wieder einblenden
      }, 200);
      
      // Zurück-Button nur anzeigen, wenn nicht auf der ersten Zeile
      backBtn.style.display = index > 0 ? "block" : "none";
      
      // Weiter-Button-Beschriftung zurücksetzen
      nextBtn.innerHTML = "Weiter";
    }

    // Wird beim Klick auf "Weiter" aufgerufen
    function next() {
      if (index < lines.length - 1) {
        // Noch nicht am Ende: nächste Dialogzeile anzeigen
        index++;
        updateSpeech();
      } else {
        // Letzte Zeile erreicht: Seite mit Fade-out-Effekt verlassen
        document.body.classList.add('fade-out'); // Startet die Ausblend-Animation (definiert in CSS)
        
        requestAnimationFrame(() => {
          // Stellt sicher, dass der Browser die Animation rendert, bevor weitergeleitet wird
          setTimeout(() => {
            // Nach 500ms (= Dauer des Fade-outs) zur Kartenansicht von Aufgabe 4 weiterleiten
            window.location.href = "../map/map4.html";
          }, 500);
        });
      }
    }

    // Wird beim Klick auf "Zurück" aufgerufen
    function previous() {
      if (index > 0) {
        // Noch nicht am Anfang: vorherige Dialogzeile anzeigen
        index--;
        updateSpeech();
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<!-- Definiert den Dokumenttyp als HTML5 -->
<html lang="de">
<!-- lang="de" kennzeichnet die Seite als deutschsprachig -->

<head>
  <meta charset="UTF-8">
  <!-- Zeichenkodierung UTF-8: unterstützt Umlaute und Sonderzeichen -->
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Optimiert die Darstellung auf Mobilgeräten -->
  
  <title>Aufgabe 7</title>
  <!-- Titel der Seite, erscheint im Browser-Tab -->
  
  <link rel="stylesheet" href="../../style/speech.css">
  <!-- Bindet die externe CSS-Datei ein (zwei Verzeichnisse höher) -->
</head>

<body>

  <!-- Charakter-Bild links unten – leitet die finale Entscheidungsaufgabe (Aufgabe 7) ein -->
  <img id="character" src="../../images/character1.png" alt="Charakter">

  <!-- Sprechblase: zeigt den aktuellen Dialogtext an (wird per JavaScript aktualisiert) -->
  <div id="speech">Feldmarschall, es stellte sich heraus dass das nur eine Vorhut war. Nun steht aber die restliche Armee der Franzosen da. Unsere letzte Verbindung über die Traun ist in Gefahr. Sie ist unser einziger Übergang zur Stadt. Doch wenn sie dem Feind in die Hände fällt… wäre alles verloren. </div>

  <!-- Zurück-Button: startet versteckt, wird ab der zweiten Zeile per JavaScript eingeblendet -->
  <button class="button bottom-left" onclick="previous()" id="backBtn" style="display: none;">Zurück</button>
  
  <!-- Weiter-Button: startet sichtbar und leitet am Ende zur finalen Aufgaben-Seite weiter -->
  <button class="button bottom-right" onclick="next()" id="nextBtn">Weiter</button>

  <script>
    // Array mit allen Dialogzeilen dieser Szene in der richtigen Reihenfolge
    // Inhalt: Einführung in die finale Entscheidung des Spiels –
    //         die Vorhut war nur der Anfang, jetzt steht die gesamte französische Armee vor Ebelsberg
    //         Der Spieler muss entscheiden: Brücke abbrennen (Rückzug) oder Verteidigung bis zum letzten Mann
    const lines = [
      // Erste Zeile: Wendepunkt – Vorhut entpuppte sich als Ablenkung, Hauptarmee steht vor der Stadt
      "Feldmarschall, es stellte sich heraus dass das nur eine Vorhut war. Nun steht aber die restliche Armee der Franzosen da. Unsere letzte Verbindung über die Traun ist in Gefahr. Sie ist unser einziger Übergang zur Stadt. Doch wenn sie dem Feind in die Hände fällt… wäre alles verloren. ",
      // Zweite Zeile: Hinweis auf den Zusammenhang zwischen bisherigen Entscheidungen und Erfolgschancen
      "Je mehr kluge Entscheidungen Ihr zuvor getroffen habt, desto besser stehen unsere Chancen, die Brücke zu halten. ",
      // Dritte Zeile: dramatische Zuspitzung – gute Führung wird belohnt, Fehler rächen sich jetzt
      "Ein Feldmarschall, der mit Weitsicht und Mut geführt hat, kann jetzt die Früchte seiner Taten ernten. Doch wer zu oft gezögert oder falsch gewählt hat, riskiert alles… ",
      // Vierte Zeile: finale Entscheidungsfrage – Brücke anzünden oder Ebelsberg verteidigen?
      "Nun liegt es bei Euch, Fackeln wir die Brücke ab, um unseren Rückzug zu sichern oder stellen wir uns dem Feind und verteidigen Ebelsberg bis zum letzten Mann? "
    ];

    // Aktueller Index: gibt an, welche Zeile gerade angezeigt wird (0 = erste Zeile)
    let index = 0;

    // Aktualisiert die Sprechblase und die Button-Sichtbarkeit passend zum aktuellen Index
    function updateSpeech() {
      const speechElement = document.getElementById("speech");
      const backBtn = document.getElementById("backBtn");
      const nextBtn = document.getElementById("nextBtn");
      
      // Sprechblase ausblenden für weichen Übergang
      speechElement.style.opacity = '0';
      
      // Nach 200ms neuen Text einsetzen und Sprechblase wieder einblenden
      setTimeout(() => {
        speechElement.innerHTML = lines[index]; // Aktuellen Dialogtext setzen
        speechElement.style.opacity = '1';      // Sprechblase wieder einblenden
      }, 200);
      
      // Zurück-Button nur anzeigen, wenn nicht auf der ersten Zeile
      backBtn.style.display = index > 0 ? "block" : "none";
      
      // Weiter-Button-Beschriftung zurücksetzen
      nextBtn.innerHTML = "Weiter";
    }

    // Wird beim Klick auf "Weiter" aufgerufen
    function next() {
      if (index < lines.length - 1) {
        // Noch nicht am Ende: nächste Dialogzeile anzeigen
        index++;
        updateSpeech();
      } else {
        // Letzte Zeile erreicht: Seite mit Fade-out-Effekt verlassen
        document.body.classList.add('fade-out'); // Startet die Ausblend-Animation (definiert in CSS)
        
        requestAnimationFrame(() => {
          // Stellt sicher, dass der Browser die Animation rendert, bevor weitergeleitet wird
          setTimeout(() => {
            // Nach 500ms (= Dauer des Fade-outs) zur finalen Aufgaben-Seite (task7.html) weiterleiten
            window.location.href = "../schnitzeljagd_aufgaben/task7/task7.html";
          }, 500);
        });
      }
    }

    // Wird beim Klick auf "Zurück" aufgerufen
    function previous() {
      if (index > 0) {
        // Noch nicht am Anfang: vorherige Dialogzeile anzeigen
        index--;
        updateSpeech();
      }
    }
  </script>
</body>
</html>

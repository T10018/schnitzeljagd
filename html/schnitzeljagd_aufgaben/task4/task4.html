<!DOCTYPE html>
<!-- Definiert den Dokumenttyp als HTML5 -->
<html lang="de">
<!-- lang="de" kennzeichnet die Seite als deutschsprachig -->

<head>
  <meta charset="UTF-8">
  <!-- Zeichenkodierung UTF-8: unterstützt Umlaute und Sonderzeichen -->
  
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Optimiert die Darstellung auf Mobilgeräten -->
  
  <title>Aufgabe 4</title>
  <!-- Titel der Seite, erscheint im Browser-Tab -->
  
  <link rel="stylesheet" href="style.css">
  <!-- Bindet die externe CSS-Datei für das Aufgaben-Layout ein -->
</head>

<body>

  <!-- ===== TIPP-BUTTON (Glühbirnen-Symbol, oben links) ===== -->
  <!-- Öffnet das Tipp-Popup per onclick="showTip()" -->
  <button class="tip-button" onclick="showTip()">
    <!-- SVG-Glühbirnen-Icon: direkt eingebettete Vektorgrafik -->
    <svg class="lightbulb" viewBox="0 0 24 24">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zM9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1z"/>
    </svg>
  </button>

  <!-- ===== HINTERGRUND-OVERLAY (abdunkelnde Fläche hinter dem Popup) ===== -->
  <!-- Klick auf das Overlay schließt das Popup per onclick="hideTip()" -->
  <div class="popup-overlay" id="popupOverlay" onclick="hideTip()"></div>

  <!-- ===== TIPP-POPUP ===== -->
  <div class="tip-popup" id="tipPopup">
    
    <!-- Schließen-Button (X) oben rechts im Popup -->
    <button class="close-btn" onclick="hideTip()">&times;</button>
    
    <!-- Popup-Kopfzeile mit Glühbirnen-Icon und Titel -->
    <div class="popup-header">
      <svg class="popup-icon" viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zM9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1z"/>
      </svg>
      <h2 class="popup-title">Hilfreiche Tipps</h2>
    </div>
    
    <!-- Tipp-Inhalt: Hinweis auf taktisches Denken (Was passiert, wenn der Feind die Kammer nimmt?) -->
    <div class="popup-content">
      <p>Denkt taktisch – was, wenn die Franzosen uns überrumpeln?</p>
    </div>
  </div>

  <!-- ===== HAUPTINHALT: ENTSCHEIDUNGSRÄTSEL ===== -->
  <div class="container">
    <h1>Die Pulverkammer sichern</h1>
    
    <!-- Aufgabenstellung: Spieler wählt eine von zwei taktischen Optionen -->
    <p>Wähle eine der folgenden Optionen aus...</p>

    <!-- ===== RADIO-BUTTONS (Einfachauswahl) ===== -->
    <!-- name="option" stellt sicher, dass immer nur eine Option gleichzeitig gewählt werden kann -->
    
    <!-- Option 1: Pulver für eigene Truppen sichern (riskant – Feind könnte es erbeuten) -->
    <label class="radio-item">
      <input type="radio" name="option" value="sichern"> Schwarzpulver für eigene Truppen sichern
    </label>
    
    <!-- Option 2: Pulver unbrauchbar machen (richtige Lösung – Feind kann es nicht nutzen) -->
    <label class="radio-item">
      <input type="radio" name="option" value="unbrauchbar"> Schwarzpulver unbrauchbar machen
    </label>
  </div>

  <!-- ===== BUTTON LINKS UNTEN (Zurück) ===== -->
  <!-- Ruft goBack() aus task4.js auf – navigiert zur vorherigen Seite -->
  <button class="button bottom-left" onclick="goBack()">Zurück</button>

  <!-- ===== BUTTON RECHTS UNTEN (Weiter / Überprüfen) ===== -->
  <!-- Ruft checkAnswer() aus task4.js auf – wertet die gewählte Option aus -->
  <button class="button bottom-right" onclick="checkAnswer()">Weiter</button>

  <!-- Externes JavaScript für die Aufgaben-Logik (Antwortprüfung, Tipp-Anzeige, etc.) -->
  <script src="task4.js"></script>
</body>
</html>

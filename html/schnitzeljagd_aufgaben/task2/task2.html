<!DOCTYPE html>
<!-- Definiert den Dokumenttyp als HTML5 -->
<html lang="de">
<!-- lang="de" kennzeichnet die Seite als deutschsprachig -->

<head>
  <meta charset="UTF-8">
  <!-- Zeichenkodierung UTF-8: unterstützt Umlaute und Sonderzeichen -->
  
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Optimiert die Darstellung auf Mobilgeräten -->
  
  <title>Aufgabe 2</title>
  <!-- Titel der Seite, erscheint im Browser-Tab -->
  
  <link rel="stylesheet" href="style.css">
  <!-- Bindet die externe CSS-Datei für das Aufgaben-Layout ein -->
</head>

<body>

  <!-- ===== TIPP-BUTTON (Glühbirnen-Symbol, oben links) ===== -->
  <!-- Öffnet das Tipp-Popup per onclick="showTip()" -->
  <button class="tip-button" onclick="showTip()">
    <!-- SVG-Glühbirnen-Icon: direkt eingebettete Vektorgrafik -->
    <svg class="lightbulb" viewBox="0 0 24 24">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zM9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1z"/>
    </svg>
  </button>

  <!-- ===== HINTERGRUND-OVERLAY (abdunkelnde Fläche hinter dem Popup) ===== -->
  <!-- Klick auf das Overlay schließt das Popup per onclick="hideTip()" -->
  <div class="popup-overlay" id="popupOverlay" onclick="hideTip()"></div>

  <!-- ===== TIPP-POPUP ===== -->
  <div class="tip-popup" id="tipPopup">
    
    <!-- Schließen-Button (X) oben rechts im Popup -->
    <button class="close-btn" onclick="hideTip()">&times;</button>
    
    <!-- Popup-Kopfzeile mit Glühbirnen-Icon und Titel -->
    <div class="popup-header">
      <svg class="popup-icon" viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zM9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1z"/>
      </svg>
      <h2 class="popup-title">Hilfreiche Tipps</h2>
    </div>
    
    <!-- Tipp-Inhalt: Hinweis auf überlebensnotwendige Gegenstände (Nahrung, Waffen, Verbandszeug) -->
    <div class="popup-content">
      <p>Denkt an das Wohl der Truppe – ohne Nahrung, Waffen und Verbandszeug ist jede Schlacht verloren.</p>
    </div>
  </div>

  <!-- ===== HAUPTINHALT: GEWICHTSRÄTSEL ===== -->
  <div class="container">
    <h1>Gewichtsrätsel</h1>
    
    <!-- Aufgabenstellung: max. 100 kg Traglast, Spieler wählt passende Gegenstände -->
    <p>Maximale Traglast: <strong>100 kg</strong><br>Wähle die richtigen Objekte aus...</p>

    <!-- ===== AUSWAHL-CHECKBOXEN ===== -->
    <!-- Jede Zeile = ein Gegenstand mit Gewicht; value = interner Name für die JavaScript-Auswertung -->
    
    <!-- Pulverfass: 40 kg – militärisch nützlich, aber schwer -->
    <label class="checkbox-item"><input type="checkbox" name="item" value="Pulverfass"> Pulverfass (40 kg)</label>
    
    <!-- Brot: 30 kg – Grundversorgung der Truppe -->
    <label class="checkbox-item"><input type="checkbox" name="item" value="Brot"> Brot für 3 Tage (30 kg)</label>
    
    <!-- Silberbesteck: 10 kg – kein militärischer Nutzen (Ablenkung/Falle) -->
    <!-- Hinweis: value="Munition" ist ein alter Bezeichner, der Inhalt ist aber Silberbesteck -->
    <label class="checkbox-item"><input type="checkbox" name="item" value="Munition"> Silberbesteck (10 kg)</label>
    
    <!-- Bandagen: 20 kg – medizinisch wichtig für Verwundete -->
    <label class="checkbox-item"><input type="checkbox" name="item" value="Bandagen"> Bandagen (20 kg)</label>
    
    <!-- Gewehrkiste: 50 kg – schwer, aber kriegsentscheidend -->
    <label class="checkbox-item"><input type="checkbox" name="item" value="Gewehre"> Gewehrkiste (50 kg)</label>
    
    <!-- Kanonenkugel: 30 kg – ohne Kanone kaum sinnvoll -->
    <label class="checkbox-item"><input type="checkbox" name="item" value="KanonKugel"> Kanon Kugel (30 kg)</label>
    
    <!-- Uniformen: 25 kg – Moral, aber kein direkter Kampfnutzen -->
    <label class="checkbox-item"><input type="checkbox" name="item" value="Uniformen"> Frische Uniformen (25 kg)</label>

    <!-- Warnmeldung: erscheint per JavaScript, wenn zu wenige Gegenstände ausgewählt wurden -->
    <!-- initial versteckt (display:none), wird bei Bedarf eingeblendet -->
    <p id="warningMessage" style="color: red; text-align: center; margin-top: 1em; display: none;">
      Bitte wähle mindestens 3 Objekte aus!
    </p>
  </div>

  <!-- ===== BUTTON RECHTS UNTEN ===== -->
  <!-- Überprüft die Auswahl des Spielers per checkAnswer() aus task2.js -->
  <button class="button bottom-right" onclick="checkAnswer()">Weiter</button>

  <!-- Externes JavaScript für die Aufgaben-Logik (Gewichtsprüfung, Tipp-Anzeige, etc.) -->
  <script src="task2.js"></script>
</body>
</html>

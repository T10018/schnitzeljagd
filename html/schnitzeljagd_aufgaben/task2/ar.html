<!DOCTYPE html>
<html>
  <head>
    <title>AR.js Minimal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <!-- A-Frame (3D-Framework für WebVR/WebAR) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <!-- AR.js für GPS-basierte AR im Browser -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
    
    <!-- Externe CSS-Datei -->
    <link rel="stylesheet" href="ar.css" />
  </head>
  <body>
    <!-- Ladeanzeige für GPS -->
    <div id="gpsLoading">
      ⏳ GPS wird gesucht… Bitte kurz stillhalten
    </div>

    <!-- A-Frame Szene mit AR.js und GPS-Kamera -->
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >
      <!-- Kamera mit GPS-Tracking -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- Modell 1 mit GPS-Koordinaten -->
      <a-entity 
        id="model1"
        gps-entity-place="latitude: 47.99621374697358; longitude: 14.11968526140547"
        gltf-model="models/model1.glb" 
        scale="2 2 2"
        animation-mixer>
      </a-entity>

    <!-- Externe JS-Datei -->
    <script src="ar.js"></script>
  </body>
</html>

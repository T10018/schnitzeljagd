<!DOCTYPE html>
<!-- Definiert den Dokumenttyp als HTML5 -->
<html>
<!-- Hinweis: lang-Attribut fehlt hier (empfohlen wäre lang="de") -->

  <head>
    <title>Aufgabe 5</title>
    <!-- Titel der Seite, erscheint im Browser-Tab -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <!-- Optimiert die Darstellung auf Mobilgeräten; user-scalable=no verhindert
         manuelles Zoomen (wichtig für AR-Anwendungen, da Zoom die Kamera stört) -->

    <!-- A-Frame: JavaScript-Framework für 3D- und VR-Inhalte im Browser -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js: Erweiterung für A-Frame, die GPS-basierte Augmented Reality ermöglicht -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>

    <!-- Externe CSS-Datei für Layout, HUD und Button-Stile -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- ===== GPS-LADEBILDSCHIRM ===== -->
    <!-- Wird angezeigt, solange das Gerät noch keinen GPS-Fix hat -->
    <!-- Per JavaScript ausgeblendet, sobald die Position gefunden wurde -->
    <div id="gpsLoading">
      ⏳ GPS wird gesucht… Bitte kurz stillhalten
    </div>

    <!-- ===== TIPP-BUTTON (Glühbirnen-Symbol, oben links) ===== -->
    <!-- Startet versteckt (display:none) – wird per JavaScript eingeblendet,
         sobald GPS gefunden wurde und das Spiel beginnt -->
    <button id="tipBtn" class="tip-button" onclick="showTip()" style="display: none;">
      <svg class="lightbulb" viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zM9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1z"/>
      </svg>
    </button>

    <!-- ===== HINTERGRUND-OVERLAY (abdunkelnde Fläche hinter dem Popup) ===== -->
    <!-- Klick auf das Overlay schließt das Popup per onclick="hideTip()" -->
    <div class="popup-overlay" id="popupOverlay" onclick="hideTip()"></div>

    <!-- ===== TIPP-POPUP ===== -->
    <div class="tip-popup" id="tipPopup">

      <!-- Schließen-Button (X) oben rechts im Popup -->
      <button class="close-btn" onclick="hideTip()">&times;</button>

      <!-- Popup-Kopfzeile mit Glühbirnen-Icon und Titel -->
      <div class="popup-header">
        <svg class="popup-icon" viewBox="0 0 24 24">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zM9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1z"/>
        </svg>
        <h2 class="popup-title">Hilfreiche Tipps</h2>
      </div>

      <!-- Tipp-Inhalt: Hinweise auf Fundorte der Dorfbewohner -->
      <div class="popup-content">
        <p>Sucht alle Dorfbewohner! Habt Ihr schon hier nachgeschaut?</p>
        <ul>
          <li>Brunnen</li>           <!-- Möglicher Fundort 1 -->
          <li>Hinter der Kirche</li> <!-- Möglicher Fundort 2 -->
          <li>Straßenrand</li>       <!-- Möglicher Fundort 3 -->
        </ul>
      </div>
    </div>
<form id="taskForm" method="POST" action="/php/task5.php">
  <input type="hidden" name="name" id="playerName">
  <input type="hidden" name="code" id="lobbyCode">
  <input type="hidden" name="playercode" id="playerCode">
  <input type="hidden" name="time" id="timeValue">
  <input type="hidden" name="usedTip" id="usedTip" value="0">
  <input type="hidden" name="action" value="finish">
</form>
    <!-- ===== HUD (Head-Up-Display) ===== -->
    <!-- Schwebende Bedienelemente über der AR-Szene -->
    <div id="hud">
      <!-- Einsammel-Button: Spieler drückt ihn, wenn er nah genug an einem Modell ist -->
      <button id="collectBtn">Einsammeln</button>
    </div>

    <!-- Timer: zeigt die verstrichene Spielzeit an (Format MM:SS) -->
    <div id="timer" class="hudBox">00:00</div>

    <!-- Zähler: zeigt eingesammelte / gesamte Dorfbewohner an (z.B. "2 / 3") -->
    <div id="counter" class="hudBox">0 / 3</div>

    <!-- ===== ENDBILDSCHIRM (erscheint nach Fund aller 3 Modelle) ===== -->
    <!-- Initial versteckt (per CSS), wird per JavaScript eingeblendet -->
    <div id="endScreen">
      <h1>🎉 Alles gefunden!</h1>
      <p>Gut gemacht, du hast die Dorfbewohner zur Flucht verholfen.</p>
      <!-- Neustart-Button: lädt die Seite neu und setzt das Spiel zurück -->
      <button onclick="submitTask()">Weiter</button>
    </div>

    <!-- ===== A-FRAME AR-SZENE ===== -->
    <!-- embedded: Szene wird in die Seite eingebettet (kein Vollbild-VR-Modus) -->
    <!-- vr-mode-ui="enabled: false": Deaktiviert den VR-Brillen-Button -->
    <!-- arjs: Konfiguration für AR.js (Webcam als Quelle, kein Debug-Panel) -->
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >
      <!-- GPS-Kamera: verknüpft die Kamera mit dem GPS und Kompass des Geräts -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- ===== 3D-MODELLE MIT GPS-KOORDINATEN ===== -->
      <!-- Jedes Modell erscheint an einem realen GPS-Standort in der AR-Ansicht -->

      <!-- Modell 1: erster Dorfbewohner -->
      <a-entity
        id="model1"
        gps-entity-place="latitude: 48.245688441588236; longitude: 14.327432069367422"
        gltf-model="models/model1.glb"
        scale="2 2 2"
        animation-mixer>
      </a-entity>

      <!-- Modell 2: zweiter Dorfbewohner -->
      <a-entity
        id="model2"
        gps-entity-place="latitude: 48.24572615553973; longitude: 14.327162845442825

"
        gltf-model="models/model2.glb"
        scale="2 2 2"
        animation-mixer>
      </a-entity>

      <!-- Modell 3: dritter Dorfbewohner -->
      <a-entity
        id="model3"
        gps-entity-place="latitude: 48.24591762594129; longitude: 14.327251715476187"
        gltf-model="models/model3.glb"
        scale="2 2 2"
        animation-mixer>
      </a-entity>

    </a-scene>

    <!-- Externes JavaScript für die Spiellogik (GPS-Prüfung, Einsammeln, Timer, etc.) -->
    <script src="task5.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR World Tracking Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- WebXR AR (A-Frame AR hit-test) -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/aframe-ar-hit-test/dist/aframe-ar-hit-test.min.js"></script>

    <style>
      #tapMessage {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        font-size: 1.2em;
        color: white;
        text-shadow: 0 0 5px black;
        z-index: 100;
      }
    </style>
  </head>

  <body>
    <div id="tapMessage">Tippe auf den Boden, um das Modell zu platzieren</div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-camera id="camera" position="0 1.6 0" look-controls></a-camera>

      <!-- Das Modell, das wir platzieren -->
      <a-entity 
        id="model1"
        gltf-model="models/model1.glb" 
        scale="0.5 0.5 0.5"
        visible="false"
        animation-mixer>
      </a-entity>

      <!-- Licht -->
      <a-entity light="type: directional; color: #fff; intensity: 1" position="0 10 0"></a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const model = document.getElementById('model1');
      const tapMessage = document.getElementById('tapMessage');

      // AR Hit-Test platzieren
      scene.addEventListener('click', async (event) => {
        if (model.getAttribute('visible') === true) return; // schon platziert

        // Hit-Test API von AR.js / WebXR
        const hitTestResults = await scene.renderer.xr.getHitTestResults();
        if (hitTestResults.length === 0) return;

        const hit = hitTestResults[0];

        const pose = hit.getPose(scene.renderer.xr.getReferenceSpace());
        const position = pose.transform.position;
        const rotation = pose.transform.orientation;

        model.setAttribute('position', `${position.x} ${position.y} ${position.z}`);
        model.setAttribute('rotation', `${rotation.x} ${rotation.y} ${rotation.z}`);
        model.setAttribute('visible', true);

        tapMessage.style.display = 'none';
      });
    </script>
  </body>
</html>

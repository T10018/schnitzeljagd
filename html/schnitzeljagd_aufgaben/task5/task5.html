<!DOCTYPE html>
<html>
  <head>
    <title>AR.js – Stabiler Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js (GPS) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: sans-serif;
      }

      #gpsLoading {
        position: fixed;
        inset: 0;
        background: black;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
    </style>
  </head>

  <body>

    <!-- GPS Ladebildschirm -->
    <div id="gpsLoading">
      ⏳ GPS wird gesucht…
    </div>

    <!-- A-Frame Szene -->
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-camera
        gps-camera
        rotation-reader
        gps-camera="simulateLatitude: 47.9962; simulateLongitude: 14.1196;"
      ></a-camera>

      <!-- TESTMODELL -->
      <a-entity
        id="testModel"
        gps-entity-place="latitude: 47.99621564921616; longitude: 14.119692166579815"
        gltf-model="models/model1.glb"
        scale="2 2 2"
        visible="false"
        animation-mixer
      >
      </a-entity>
    </a-scene>

    <!-- Script -->
    <script src="task5.js"></script>
  </body>
</html>
